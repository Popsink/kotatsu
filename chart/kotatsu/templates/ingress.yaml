{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "common.names.fullname" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "kotatsu.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations: {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.ingressClassName }}
  ingressClassName: {{ .Values.ingress.ingressClassName | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.hostname | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: {{ .Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "common.names.fullname" . }}
                port:
                  name: http
          {{- range .Values.ingress.extraPaths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "ImplementationSpecific" }}
            backend:
              service:
                name: {{ .service | default (include "common.names.fullname" $) }}
                port:
                  name: {{ .portName | default "http" }}
          {{- end }}
    {{- range .Values.ingress.extraHosts }}
    - host: {{ .name | quote }}
      http:
        paths:
          - path: {{ .path | default "/" }}
            pathType: {{ .pathType | default "ImplementationSpecific" }}
            backend:
              service:
                name: {{ include "common.names.fullname" $ }}
                port:
                  name: http
    {{- end }}
    {{- range .Values.ingress.extraRules }}
    - {{ include "common.tplvalues.render" (dict "value" . "context" $) | nindent 6 | trim }}
    {{- end }}
  {{- if or (and .Values.ingress.tls .Values.ingress.hostname) .Values.ingress.extraTls }}
  tls:
    {{- if and .Values.ingress.tls .Values.ingress.hostname }}
    - hosts:
        - {{ .Values.ingress.hostname | quote }}
      secretName: {{ printf "%s-tls" .Values.ingress.hostname }}
    {{- end }}
    {{- range .Values.ingress.extraTls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
{{- end }}
