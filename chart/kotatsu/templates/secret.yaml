{{- if (include "kotatsu.createS3Secret" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kotatsu.s3SecretName" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "kotatsu.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}
  {{- end }}
type: Opaque
data:
  {{ .Values.s3.secretKeys.accessKey }}: {{ .Values.s3.accessKey | b64enc | quote }}
  {{ .Values.s3.secretKeys.secretKey }}: {{ .Values.s3.secretKey | b64enc | quote }}
{{- end }}
