# Local stack: the Kotatsu app (backend + bundled frontend), a MinIO S3 that
# stands in for the object store, and a Tansu broker writing to it — so you can
# produce events with any Kafka client and browse them in Kotatsu.
#
# The cluster name (clusters/{cluster}/ prefix) is Tansu's --kafka-cluster-id,
# here "demo", which Kotatsu reads via KOTATSU_CLUSTER.
services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # MinIO console
    volumes:
      - minio-data:/data

  # One-shot: create the bucket Kotatsu reads from.
  createbucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb -p local/tansu || true;
      echo 'bucket ready';
      "

  # Kafka-compatible broker persisting to the MinIO bucket. Produce events to
  # localhost:9092 and they land under clusters/demo/ in the bucket.
  tansu:
    image: ghcr.io/tansu-io/tansu:latest
    depends_on:
      - minio
      - createbucket
    environment:
      RUST_LOG: warn,tansu_broker=info,tansu_storage=info
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT: http://minio:9000
      AWS_ALLOW_HTTP: "true"
      AWS_DEFAULT_REGION: us-east-1
    command: >
      --kafka-cluster-id demo
      --kafka-listener-url tcp://0.0.0.0:9092/
      --kafka-advertised-listener-url tcp://tansu:9092
      --storage-engine s3://tansu/
    ports:
      - "9092:9092"

  # Confluent-compatible schema registry (Popsink Kora) + its PostgreSQL.
  # Avro/JSON/Protobuf schemas are resolved here by schema id.
  kora-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: kora
      POSTGRES_USER: kora
      POSTGRES_PASSWORD: kora
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kora"]
      interval: 2s
      timeout: 3s
      retries: 10
    volumes:
      - kora-db-data:/var/lib/postgresql/data

  kora:
    image: ghcr.io/popsink/kora:latest
    depends_on:
      kora-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://kora:kora@kora-db:5432/kora
      RUST_LOG: info
    ports:
      - "8085:8080" # Kora REST (host:8085 → container:8080)

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - minio
    ports:
      - "8080:8080"
    environment:
      KOTATSU_BIND: 0.0.0.0:8080
      KOTATSU_CLUSTER: demo
      KOTATSU_S3_ENDPOINT: http://minio:9000
      KOTATSU_S3_BUCKET: tansu
      KOTATSU_S3_REGION: us-east-1
      KOTATSU_S3_ACCESS_KEY: minioadmin
      KOTATSU_S3_SECRET_KEY: minioadmin
      KOTATSU_S3_FORCE_PATH_STYLE: "true"
      # Schema registry (Kora) — consumed by #6/#8
      KOTATSU_KORA_URL: http://kora:8080

volumes:
  minio-data:
  kora-db-data:
