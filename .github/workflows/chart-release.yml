name: chart-release

# Package the Helm chart and push it to the GitHub Container Registry as an OCI
# artifact. Runs on version tags (alongside the image release) and on demand.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Log in to ghcr.io
        run: |
          helm registry login ghcr.io \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }}

      - name: Package & push chart
        run: |
          helm dependency build chart/kotatsu
          helm package chart/kotatsu -d dist
          helm push dist/kotatsu-*.tgz oci://ghcr.io/popsink/charts
